name = "brainy-bees-registration"
main = "workers/registration.js"
compatibility_date = "2024-01-01"

# KV Namespace for storing registrations
# Create with: wrangler kv:namespace create "REGISTRATIONS"
# Then replace the id below with the output id
[[kv_namespaces]]
binding = "REGISTRATIONS"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# Environment variables (set secrets with: wrangler secret put RESEND_API_KEY)
[vars]
ENVIRONMENT = "production"

# Cloudflare Pages config
[site]
bucket = "./dist"

# Routes - worker handles /api/* paths
[[routes]]
pattern = "brainybeescamp.ca/api/*"
zone_name = "brainybeescamp.ca"
